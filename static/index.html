<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>老麦商业 IP 智能体</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-zinc-50 text-zinc-950">
    <main class="mx-auto grid min-h-screen max-w-7xl gap-5 px-5 py-5 lg:grid-cols-[360px_1fr]">
      <aside class="space-y-4">
        <section class="rounded border border-zinc-200 bg-white p-4">
          <h1 class="text-xl font-semibold">老麦商业 IP 智能体</h1>
          <p class="mt-2 text-sm text-zinc-600">导入资料、选择模式、生成带来源的内容草稿。</p>
        </section>
        <section class="rounded border border-zinc-200 bg-white p-4">
          <h2 class="font-medium">资料导入</h2>
          <button id="importBtn" class="mt-3 w-full rounded bg-zinc-950 px-3 py-2 text-sm text-white">批量导入投喂资料</button>
          <label class="mt-3 block">
            <span class="text-sm text-zinc-600">上传 Markdown</span>
            <input id="fileInput" type="file" accept=".md,.markdown" class="mt-2 w-full text-sm" />
          </label>
          <div id="importStatus" class="mt-3 text-sm text-zinc-600"></div>
        </section>
        <section class="rounded border border-zinc-200 bg-white p-4">
          <div class="flex items-center justify-between">
            <h2 class="font-medium">已导入文档</h2>
            <button id="refreshDocs" class="rounded border border-zinc-300 px-2 py-1 text-xs">刷新</button>
          </div>
          <div id="docs" class="mt-3 max-h-72 space-y-2 overflow-auto text-sm"></div>
        </section>
      </aside>
      <section class="space-y-4">
        <div class="rounded border border-zinc-200 bg-white p-4">
          <div class="grid gap-3 md:grid-cols-[1fr_220px]">
            <textarea id="query" rows="5" class="w-full rounded border border-zinc-300 p-3 text-sm" placeholder="输入问题，例如：帮我生成 10 个低成本获客选题"></textarea>
            <div class="space-y-3">
              <select id="mode" class="w-full rounded border border-zinc-300 p-2 text-sm">
                <option value="topics">topics 选题</option>
                <option value="script">script 脚本</option>
                <option value="moments">moments 朋友圈</option>
                <option value="sales">sales 销售话术</option>
                <option value="sop">sop SOP问答</option>
                <option value="meeting_to_knowledge">meeting_to_knowledge 会议投喂</option>
                <option value="auto">auto 自动判断</option>
              </select>
              <button id="askBtn" class="w-full rounded bg-zinc-950 px-3 py-2 text-sm text-white">生成</button>
              <button id="copyBtn" class="w-full rounded border border-zinc-300 px-3 py-2 text-sm">复制结果</button>
            </div>
          </div>
        </div>
        <div class="grid gap-4 xl:grid-cols-[1fr_340px]">
          <article class="rounded border border-zinc-200 bg-white p-4">
            <div class="mb-3 flex items-center justify-between">
              <h2 class="font-medium">生成结果</h2>
              <span id="intent" class="text-sm text-zinc-500"></span>
            </div>
            <pre id="answer" class="min-h-96 whitespace-pre-wrap text-sm leading-6"></pre>
          </article>
          <aside class="rounded border border-zinc-200 bg-white p-4">
            <h2 class="font-medium">参考来源</h2>
            <div id="sources" class="mt-3 space-y-3 text-sm"></div>
          </aside>
        </div>
      </section>
    </main>
    <script>
      const $ = (id) => document.getElementById(id);
      async function refreshDocs() {
        const res = await fetch("/api/documents");
        const data = await res.json();
        $("docs").innerHTML = data.documents.map((doc) => `<div class="rounded border border-zinc-200 p-2">${doc.path}</div>`).join("");
      }
      $("importBtn").onclick = async () => {
        $("importStatus").textContent = "正在导入...";
        const form = new FormData();
        form.append("source", "私董会学员ai投喂资料");
        const res = await fetch("/api/import", { method: "POST", body: form });
        const data = await res.json();
        $("importStatus").textContent = `已导入 ${data.files} 个文件，生成 ${data.chunks} 个切片。`;
        refreshDocs();
      };
      $("fileInput").onchange = async (event) => {
        const file = event.target.files[0];
        if (!file) return;
        $("importStatus").textContent = "正在上传...";
        const form = new FormData();
        form.append("file", file);
        const res = await fetch("/api/upload", { method: "POST", body: form });
        const data = await res.json();
        $("importStatus").textContent = `已上传 ${data.file}，当前 ${data.chunks} 个切片。`;
        refreshDocs();
      };
      $("askBtn").onclick = async () => {
        $("answer").textContent = "正在检索和生成...";
        const form = new FormData();
        form.append("query", $("query").value);
        form.append("mode", $("mode").value);
        const res = await fetch("/api/ask", { method: "POST", body: form });
        const data = await res.json();
        $("intent").textContent = `intent: ${data.intent}`;
        $("answer").textContent = data.answer;
        $("sources").innerHTML = data.sources.map((item) => {
          const c = item.chunk;
          return `<div class="rounded border border-zinc-200 p-2"><div class="font-medium">${c.file_path}</div><div class="mt-1 text-zinc-600">${c.section_path}</div><div class="mt-1 text-xs text-zinc-500">score: ${item.score.toFixed(3)} · ${c.type}</div></div>`;
        }).join("");
      };
      $("copyBtn").onclick = async () => navigator.clipboard.writeText($("answer").textContent);
      $("refreshDocs").onclick = refreshDocs;
      refreshDocs();
    </script>
  </body>
</html>
